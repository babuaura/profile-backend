services:
  - type: web
    name: babu-personal-os-api
    runtime: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: STORAGE_DRIVER
        value: postgres
      - key: AUTO_MIGRATE
        value: true
      - key: ADMIN_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000
      - key: AI_PROVIDER
        value: gemini
      - key: AI_API_KEY
        sync: false
      - key: AI_MODEL
        value: gemini-1.5-flash
      - key: FCM_SERVER_KEY
        sync: false
